name: CI/CD

on:
  push:
    branches: [main]
    paths-ignore:
      - k8s/kustomization.yaml
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write          # push kustomization.yaml image-tag updates
  packages: write          # push images to GHCR
  security-events: write   # upload Trivy SARIF to GitHub Security tab

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  # ─── Build & Push ─────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        include:
          - service: backend
            context: ./backend
            build_arg: ""
          - service: client
            context: ./client
            build_arg: "BACKEND_URL=http://backend:8080"

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo $IMAGE_TAG | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/tenaco-${{ matrix.service }}
          tags: |
            type=raw,value=sha-${{ steps.sha.outputs.short }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_arg }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ─── Trivy Security Scan ──────────────────────────────────────────────────
  trivy-scan:
    name: Trivy scan (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: build-and-push
    strategy:
      fail-fast: false
      matrix:
        service: [backend, client]

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo $IMAGE_TAG | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Scan ${{ matrix.service }} for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ github.repository_owner }}/tenaco-${{ matrix.service }}:sha-${{ steps.sha.outputs.short }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Upload results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  # ─── GitOps Update ────────────────────────────────────────────────────────
  gitops-update:
    name: Update kustomization & sync ArgoCD
    runs-on: ubuntu-latest
    needs: trivy-scan
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: main
          fetch-depth: 0

      - name: Install kustomize
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Set short SHA
        id: sha
        run: echo "short=$(echo $IMAGE_TAG | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Update image tags in kustomization.yaml
        working-directory: k8s
        run: |
          kustomize edit set image \
            tenaco-backend=${{ env.REGISTRY }}/${{ github.repository_owner }}/tenaco-backend:sha-${{ steps.sha.outputs.short }} \
            tenaco-client=${{ env.REGISTRY }}/${{ github.repository_owner }}/tenaco-client:sha-${{ steps.sha.outputs.short }}

      - name: Commit and push image-tag update
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/kustomization.yaml
          git diff --staged --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore(deploy): bump images to sha-${{ steps.sha.outputs.short }}"
          git pull --rebase origin main
          git push origin HEAD:main

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region "${{ vars.AWS_REGION }}" \
            --name   "${{ vars.EKS_CLUSTER_NAME }}"

      - name: Wait for ArgoCD to roll out backend
        run: |
          kubectl rollout status deployment/backend \
            --namespace tenaco \
            --timeout=300s

      - name: Wait for ArgoCD to roll out client
        run: |
          kubectl rollout status deployment/client \
            --namespace tenaco \
            --timeout=300s

      - name: Verify deployment
        run: |
          kubectl get pods    --namespace tenaco -o wide
          kubectl get ingress --namespace tenaco
          kubectl get hpa     --namespace tenaco
