name: PR Checks

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — build & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Build and test
        working-directory: backend
        run: mvn verify -q
        env:
          DATABASE_URL: jdbc:h2:mem:testdb
          DB_USERNAME: sa
          DB_PASSWORD: ""
          JWT_SECRET: test-jwt-secret-key-at-least-256-bits-long-for-hs256-algorithm

  frontend:
    name: Frontend — lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        working-directory: client
        run: npm ci

      - name: Lint
        working-directory: client
        run: npm run lint

      - name: Build (type-check via tsc + Next.js compiler)
        working-directory: client
        run: npm run build
        env:
          BACKEND_URL: http://localhost:8080
