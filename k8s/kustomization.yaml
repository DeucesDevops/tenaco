apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - external-secrets.yaml
  - ingress.yaml
  - backend-deployment.yaml
  - client-deployment.yaml
  - monitoring.yaml

# Image tags are updated by the deploy pipeline via:
#   kustomize edit set image \
#     tenaco-backend=ghcr.io/deucesdevops/tenaco-backend:<TAG>
#     tenaco-client=ghcr.io/deucesdevops/tenaco-client:<TAG>
images:
  - name: tenaco-backend
    newName: ghcr.io/deucesdevops/tenaco-backend
    newTag: latest
  - name: tenaco-client
    newName: ghcr.io/deucesdevops/tenaco-client
    newTag: latest
