# ─────────────────────────────────────────────────────────────────────────────
# External Secrets — pulls values from AWS Secrets Manager into K8s Secrets.
#
# Prerequisites:
#   helm repo add external-secrets https://charts.external-secrets.io
#   helm install external-secrets external-secrets/external-secrets -n external-secrets --create-namespace
#
# Create the AWS secret before first deploy:
#   aws secretsmanager create-secret \
#     --name tenaco/production \
#     --secret-string '{
#       "DATABASE_URL": "jdbc:postgresql://HOST:5432/tenaco?sslmode=require",
#       "DB_USERNAME": "...",
#       "DB_PASSWORD": "...",
#       "JWT_SECRET": "...",
#       "CORS_ALLOWED_ORIGINS": "https://tenaco.yourdomain.com",
#       "MAIL_USERNAME": "...",
#       "MAIL_PASSWORD": "..."
#     }'
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: aws-secrets-manager
  namespace: tenaco
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1   # update to match your AWS_REGION

---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: tenaco-secrets
  namespace: tenaco
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: SecretStore
  target:
    name: tenaco-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: tenaco/production
        property: DATABASE_URL
    - secretKey: DB_USERNAME
      remoteRef:
        key: tenaco/production
        property: DB_USERNAME
    - secretKey: DB_PASSWORD
      remoteRef:
        key: tenaco/production
        property: DB_PASSWORD
    - secretKey: JWT_SECRET
      remoteRef:
        key: tenaco/production
        property: JWT_SECRET
    - secretKey: CORS_ALLOWED_ORIGINS
      remoteRef:
        key: tenaco/production
        property: CORS_ALLOWED_ORIGINS
    - secretKey: MAIL_USERNAME
      remoteRef:
        key: tenaco/production
        property: MAIL_USERNAME
    - secretKey: MAIL_PASSWORD
      remoteRef:
        key: tenaco/production
        property: MAIL_PASSWORD
