# AWS ALB Ingress — requires the AWS Load Balancer Controller.
# Replace yourdomain.com and the ACM certificate ARN before deploying.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tenaco
  namespace: tenaco
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80,"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:us-east-1:ACCOUNT_ID:certificate/REPLACE_ME
    alb.ingress.kubernetes.io/healthcheck-path: /actuator/health
spec:
  rules:
    - host: tenaco.yourdomain.com
      http:
        paths:
          # All /api/* traffic goes directly to the backend
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080
          # Everything else goes to the Next.js client
          # (Next.js rewrites /api/* internally to the backend service)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: client
                port:
                  number: 3000
